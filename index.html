<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Survey</title>
    <style>
        /* Base Reset & Mobile Optimization */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #5d5e62; /* Your deep background choice */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Brand Logo Container */
        .logo-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            margin-bottom: 20px;
        }

        .brand-logo {
            max-width: 140px; /* Perfectly sized for mobile layouts */
            max-height: 70px;
            object-fit: contain;
        }

        /* Progress Bar Tracker */
        .progress-container {
            width: 100%;
            max-width: 400px;
            background-color: #b4cac0; /* Brand secondary color used as base track */
            height: 6px;
            border-radius: 10px;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 20%; /* Starts at 20% for Step 1 of 5 */
            background-color: #a0cfba; /* Your accent green */
            transition: width 0.3s ease;
        }

        /* Card Container */
        .form-container {
            background: #ffffff; /* Brand crisp white container */
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        /* Step Visibility & Smooth Fade Effect */
        .step {
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .step.active {
            display: block;
            opacity: 1;
        }

        /* Question Typography */
        p.question {
            font-size: 24px;
            font-weight: 600;
            line-height: 1.35;
            margin-bottom: 40px;
            color: #2b2b2b; /* Softened black for readability */
        }

        /* Mobile-First Big Buttons */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        button {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        /* Yes Button: Clean Accent Green */
        .btn-yes {
            background-color: #a0cfba;
            color: #ffffff;
        }

        /* No Button: Muted Soft Brand Color with Deep Gray Text */
        .btn-no {
            background-color: #f0f4f2; /* Ultra light tint of your brand brand tones */
            color: #5d5e62;
            border: 2px solid #b4cac0; /* Framed nicely by your brand color */
        }

        /* Subtle button press effect for mobile responsiveness */
        button:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

<!-- Logo Placement -->
<div class="logo-container">
    <!-- If your logo is named logo.png and placed in the same folder on GitHub, this just works -->
    <img src="logo.png" alt="Brand Logo" class="brand-logo" onerror="this.style.display='none'">
</div>

<!-- Progress Bar -->
<div class="progress-container">
    <div class="progress-bar" id="progress"></div>
</div>

<!-- Main Form Card -->
<div class="form-container">
    <form id="multi-step-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        
        <!-- Step 1 -->
        <div class="step active" id="step1">
            <p class="question">Question 1: Change this to your first question?</p>
            <div class="btn-container">
                <button type="button" class="btn-yes" onclick="nextStep('yes')">Yes</button>
                <button type="button" class="btn-no" onclick="nextStep('no')">No</button>
            </div>
        </div>

        <!-- Step 2 -->
        <div class="step" id="step2">
            <p class="question">Question 2: Change this to your second question?</p>
            <div class="btn-container">
                <button type="button" class="btn-yes" onclick="nextStep('yes')">Yes</button>
                <button type="button" class="btn-no" onclick="nextStep('no')">No</button>
            </div>
        </div>

        <!-- Step 3 -->
        <div class="step" id="step3">
            <p class="question">Question 3: Change this to your third question?</p>
            <div class="btn-container">
                <button type="button" class="btn-yes" onclick="nextStep('yes')">Yes</button>
                <button type="button" class="btn-no" onclick="nextStep('no')">No</button>
            </div>
        </div>

        <!-- Step 4 -->
        <div class="step" id="step4">
            <p class="question">Question 4: Change this to your fourth question?</p>
            <div class="btn-container">
                <button type="button" class="btn-yes" onclick="nextStep('yes')">Yes</button>
                <button type="button" class="btn-no" onclick="nextStep('no')">No</button>
            </div>
        </div>

        <!-- Step 5 -->
        <div class="step" id="step5">
            <p class="question">Question 5: Change this to your fifth question?</p>
            <div class="btn-container">
                <button type="button" class="btn-yes" onclick="nextStep('yes')">Yes</button>
                <button type="button" class="btn-no" onclick="nextStep('no')">No</button>
            </div>
        </div>

    </form>
</div>

<script>
    let currentStep = 1;
    const totalSteps = 5;
    let allAnswersAreYes = true;

    function nextStep(answer) {
        if (answer === 'no') {
            allAnswersAreYes = false;
        }

        // Hide current step
        document.getElementById(`step${currentStep}`).classList.remove('active');
        currentStep++;

        const nextStepEl = document.getElementById(`step${currentStep}`);
        
        if (nextStepEl) {
            // Update Progress Bar
            const progressPercentage = (currentStep / totalSteps) * 100;
            document.getElementById('progress').style.width = `${progressPercentage}%`;

            // Show next question
            setTimeout(() => {
                nextStepEl.classList.add('active');
            }, 50);
        } else {
            // End of form reached
            if (allAnswersAreYes) {
                window.location.href = "https://your-success-redirection-url.com";
            } else {
                window.location.href = "https://your-thank-you-page.com";
            }
        }
    }
</script>
</body>
</html>
