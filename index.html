<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Survey</title>
    <style>
        /* Base Reset & Mobile Optimization */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #5d5e62;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Brand Logo Container */
        .logo-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            margin-bottom: 20px;
        }

        .brand-logo {
            max-width: 140px;
            max-height: 70px;
            object-fit: contain;
        }

        /* Progress Bar Tracker */
        .progress-container {
            width: 100%;
            max-width: 400px;
            background-color: rgba(255, 255, 255, 0.2); /* Semi-transparent white that pops off your charcoal background */
            height: 8px; /* Slightly thicker (from 6px to 8px) for better visibility */
            border-radius: 10px;
            margin-bottom: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1); /* Subtle outline */
        }

        .progress-bar {
            height: 100%;
            width: 0%; 
            background-color: #a0cfba; /* Your beautiful accent green stands out cleanly now */
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 8px rgba(160, 207, 186, 0.5); /* Subtle glow effect to emphasize the fill */
        }


        
        /* Card Container */
        .form-container {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 320px; /* Keeps the container a stable height during cross-fade */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        form {
            width: 100%;
            height: 100%;
            padding: 40px 30px;
        }

        /* Ultra-Smooth Crossfade Setup */
        .step {
            position: absolute;
            top: 40px;
            left: 30px;
            right: 30px;
            bottom: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .step.active {
            position: relative;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        /* Question Typography */
        p.question {
            font-size: 24px;
            font-weight: 600;
            line-height: 1.35;
            margin-bottom: 30px;
            color: #2b2b2b;
        }

        /* Mobile Buttons layout */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        button {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-yes {
            background-color: #a0cfba;
            color: #ffffff;
        }

        .btn-no {
            background-color: #f0f4f2;
            color: #5d5e62;
            border: 2px solid #b4cac0;
        }

        button:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

<div class="logo-container">
    <img src="logo.png?v=1" alt="Brand Logo" class="brand-logo" onerror="this.style.display='none'">
</div>

<div class="progress-container">
    <div class="progress-bar" id="progress"></div>
</div>

<div class="form-container">
    <form id="multi-step-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        
        <div class="step active" id="step1">
            <p class="question">Question 1: Change this to your first question?</p>
            <div class="btn-container">
                <button type="button" class="btn-yes" onclick="nextStep('yes')">Yes</button>
                <button type="button" class="btn-no" onclick="nextStep('no')">No</button>
            </div>
        </div>

        <div class="step" id="step2">
            <p class="question">Question 2: Change this to your second question?</p>
            <div class="btn-container">
                <button type="button" class="btn-yes" onclick="nextStep('yes')">Yes</button>
                <button type="button" class="btn-no" onclick="nextStep('no')">No</button>
            </div>
        </div>

        <div class="step" id="step3">
            <p class="question">Question 3: Change this to your third question?</p>
            <div class="btn-container">
                <button type="button" class="btn-yes" onclick="nextStep('yes')">Yes</button>
                <button type="button" class="btn-no" onclick="nextStep('no')">No</button>
            </div>
        </div>

        <div class="step" id="step4">
            <p class="question">Question 4: Change this to your fourth question?</p>
            <div class="btn-container">
                <button type="button" class="btn-yes" onclick="nextStep('yes')">Yes</button>
                <button type="button" class="btn-no" onclick="nextStep('no')">No</button>
            </div>
        </div>

        <div class="step" id="step5">
            <p class="question">Question 5: Change this to your fifth question?</p>
            <div class="btn-container">
                <button type="button" class="btn-yes" onclick="nextStep('yes')">Yes</button>
                <button type="button" class="btn-no" onclick="nextStep('no')">No</button>
            </div>
        </div>

    </form>
</div>

<script>
    let currentStep = 1;
    const totalSteps = 5;
    let allAnswersAreYes = true;

    // Initialize progress bar perfectly on page load (Step 1 = 20%)
    function updateProgressBar() {
        const progressPercentage = (currentStep / totalSteps) * 100;
        document.getElementById('progress').style.width = `${progressPercentage}%`;
    }
    updateProgressBar();

    function nextStep(answer) {
        if (answer === 'no') {
            allAnswersAreYes = false;
        }

        // Deactivate old step (initiates fade-out animation)
        document.getElementById(`step${currentStep}`).classList.remove('active');
        currentStep++;

        const nextStepEl = document.getElementById(`step${currentStep}`);
        
        if (nextStepEl) {
            // Update the progress bar fluidly
            updateProgressBar();

            // Activate new step (initiates fade-in animation)
            nextStepEl.classList.add('active');
        } else {
            // Form is completed -> Redirect logic
            if (allAnswersAreYes) {
                window.location.href = "https://your-success-redirection-url.com";
            } else {
                window.location.href = "https://your-thank-you-page.com";
            }
        }
    }
</script>
</body>
</html>
