<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Survey</title>
    <style>
        /* Base Reset & Mobile Optimization */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Progress Bar Tracker */
        .progress-container {
            width: 100%;
            max-width: 400px;
            background-color: #e0e0e0;
            height: 6px;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 20%; /* Starts at 20% for Step 1 of 5 */
            background-color: #007aff; /* Premium iOS Blue */
            transition: width 0.3s ease;
        }

        /* Card Container */
        .form-container {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        /* Step Visibility & Smooth Fade Effect */
        .step {
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .step.active {
            display: block;
            opacity: 1;
        }

        /* Question Typography */
        p.question {
            font-size: 26px; /* Big, highly readable font size */
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 40px;
            color: #1c1c1e;
        }

        /* Mobile-First Big Buttons */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        button {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        /* Distinct styles for Yes vs No to prevent accidental clicks */
        .btn-yes {
            background-color: #007aff;
            color: white;
        }

        .btn-no {
            background-color: #f2f2f7;
            color: #ff3b30; /* Red text for 'No' */
        }

        /* Subtle button press effect for mobile */
        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="progress-container">
    <div class="progress-bar" id="progress"></div>
</div>

<div class="form-container">
    <form id="multi-step-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        
        <div class="step active" id="step1">
            <p class="question">Question 1: Change this to your first question?</p>
            <div class="btn-container">
                <button type="button" class="btn-yes" onclick="nextStep('yes')">Yes</button>
                <button type="button" class="btn-no" onclick="nextStep('no')">No</button>
            </div>
        </div>

        <div class="step" id="step2">
            <p class="question">Question 2: Change this to your second question?</p>
            <div class="btn-container">
                <button type="button" class="btn-yes" onclick="nextStep('yes')">Yes</button>
                <button type="button" class="btn-no" onclick="nextStep('no')">No</button>
            </div>
        </div>

        <div class="step" id="step3">
            <p class="question">Question 3: Change this to your third question?</p>
            <div class="btn-container">
                <button type="button" class="btn-yes" onclick="nextStep('yes')">Yes</button>
                <button type="button" class="btn-no" onclick="nextStep('no')">No</button>
            </div>
        </div>

        <div class="step" id="step4">
            <p class="question">Question 4: Change this to your fourth question?</p>
            <div class="btn-container">
                <button type="button" class="btn-yes" onclick="nextStep('yes')">Yes</button>
                <button type="button" class="btn-no" onclick="nextStep('no')">No</button>
            </div>
        </div>

        <div class="step" id="step5">
            <p class="question">Question 5: Change this to your fifth question?</p>
            <div class="btn-container">
                <button type="button" class="btn-yes" onclick="nextStep('yes')">Yes</button>
                <button type="button" class="btn-no" onclick="nextStep('no')">No</button>
            </div>
        </div>

    </form>
</div>

<script>
    let currentStep = 1;
    const totalSteps = 5;
    let allAnswersAreYes = true;

    function nextStep(answer) {
        if (answer === 'no') {
            allAnswersAreYes = false;
        }

        // Hide current step
        document.getElementById(`step${currentStep}`).classList.remove('active');
        currentStep++;

        const nextStepEl = document.getElementById(`step${currentStep}`);
        
        if (nextStepEl) {
            // Update Progress Bar
            const progressPercentage = (currentStep / totalSteps) * 100;
            document.getElementById('progress').style.width = `${progressPercentage}%`;

            // Show next question with a slight delay for a smoother feel
            setTimeout(() => {
                nextStepEl.classList.add('active');
            }, 50);
        } else {
            // End of form reached
            if (allAnswersAreYes) {
                window.location.href = "https://your-success-redirection-url.com";
            } else {
                window.location.href = "https://your-thank-you-page.com";
            }
        }
    }
</script>
</body>
</html>
